{% extends "base.html" %}
{% block content %}

<!-- Everthing here should technically work but needs the database fuctions to be done-->
<div class="container mt-4">
    <h2 class="text-center">{{ 'Oppdatere' if kunde else 'Legge til' }} Kunde</h2>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label for="kundenr" class="form-label">KundeNr</label>
            <input type="text" class="form-control" id="kundenr" name="kundenr" value="{{ kunde.kundenr if kunde else '' }}" {% if kunde %}readonly{% endif %}>
            <div id="kundenr-feedback" class="form-text"></div>
        </div>

        <div class="mb-3">
            <label for="kundetype" class="form-label">Kundetype</label>
                <select class="form-control" id="kundetype" name="kundetype">
                    <option value="privat" {% if kunde and kunde.kundetype == 'privat' %}selected{% endif %}>Privat</option>
                    <option value="bedrift" {% if kunde and kunde.kundetype == 'bedrift' %}selected{% endif %}>Bedrift</option>
                </select>
        </div>

        <div class="mb-3">
            <label for="fornavn" class="form-label">Fornavn</label>
            <input type="text" class="form-control" id="fornavn" name="fornavn"
       value="{{ kunde.fornavn if kunde else '' }}"
       title="Not applicable for bedrift kunde">
        </div>

        <div class="mb-3">
            <label for="etternavn" class="form-label">Etternavn</label>
            <input type="text" class="form-control" id="etternavn" name="etternavn"
       value="{{ kunde.etternavn if kunde else '' }}"
       title="Not applicable for bedrift kunde">
        </div>

        <div class="mb-3">
            <label for="kundenavn" class="form-label">Bedriftsnavn</label>
            <input type="text" class="form-control" id="kundenavn" name="kundenavn"
       value="{{ kunde.kundenavn if kunde else '' }}"
       title="Not applicable for privat kunde">
        </div>

        <div class="mb-3">
            <label for="epost" class="form-label">Epost</label>
            <input type="email" class="form-control" id="epost" name="epost" value="{{ kunde.epost if kunde else '' }}">
        </div>

        <div class="mb-3">
            <label for="mobil" class="form-label">Mobil</label>
            <input type="text" class="form-control" id="mobil" name="mobil" value="{{ kunde.mobil if kunde else '' }}">
        </div>

        <div class="mb-3">
            <label for="fakt_adresse" class="form-label">Faktura Adresse</label>
            <input type="text" class="form-control" id="fakt_adresse" name="fakt_adresse"
       value="{{ kunde.fakt_adresse if kunde else '' }}"
       placeholder="Gate, Nummer, PostNr"
       title="Format: Gate, Nummer, PostNr. For eksempel: Murergata, 1, 9001">
        </div>

        <div class="mb-3">
            <label for="levering_adresse" class="form-label">Levering Adresse</label>
            <input type="text" class="form-control" id="levering_adresse" name="levering_adresse"
       value="{{ kunde.levering_adresse if kunde else '' }}"
       placeholder="Gate, Nummer, PostNr"
       title="Format: Gate, Nummer, PostNr. For eksempel: Veien, 4, 8000">
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">
                {{ 'Oppdatere' if kunde else 'Legge til' }} Kunde
            </button>
        </div>
    </form>
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const kundetype = document.getElementById("kundetype");
        const kundenavn = document.getElementById("kundenavn");
        const fornavn = document.getElementById("fornavn");
        const etternavn = document.getElementById("etternavn");
        const kundenr = document.getElementById("kundenr");
        const kundenrFeedback = document.getElementById("kundenr-feedback");

        function updateKundenavnState() {
            if (kundetype.value === "privat") {
                // Privat → lock Bedriftsnavn
                kundenavn.disabled = true;
                kundenavn.value = "";

                // Privat → unlock navn
                fornavn.disabled = false;
                etternavn.disabled = false;

            }
            else {
                // Bedrift → unlock Bedriftsnavn
                kundenavn.disabled = false;

                // Bedrift → lockq
                //
                // navn
                fornavn.disabled = true;
                etternavn.disabled = true;

                fornavn.value = "";
                etternavn.value = "";
            }
        }

        function checkKundenr() {
            if (!kundenr || kundenr.readOnly) {
                return;
            }

            const value = kundenr.value.trim();

            if (value === "") {
                kundenrFeedback.textContent = "";
                return;
            }

            fetch(`/kunder/check_kundenr?kundenr=${encodeURIComponent(value)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.exists) {
                        kundenrFeedback.textContent = "KundeNr finnes allerede.";
                        kundenrFeedback.className = "text-danger";
                    } else {
                        kundenrFeedback.textContent = "KundeNr er tilgjengelig.";
                        kundenrFeedback.className = "text-success";
                    }
                });
        }

        // intially set the state of kundenavn based on the current kundetype value
        updateKundenavnState();

        // add event listener to update the state of kundenavn when kundetype changes
        kundetype.addEventListener("change", updateKundenavnState);
        kundenr.addEventListener("blur", checkKundenr);
    });
    </script>
</div>
{% endblock %}
