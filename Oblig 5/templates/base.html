<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utleie app</title>
    <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="contianer mt-4"> <!--Navbar-->
        <div class="text-center">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('home') }}" class="btn btn-secondary btn-sm">Home</a>
                <a href="{{ url_for('users.profile') }}" class="btn btn-secondary btn-sm">Min side</a>
                <a href="{{ url_for('utstyr.all') }}" class="btn btn-secondary btn-sm">Utstyr</a>
                <a href="{{ url_for('utleie.all') }}" class="btn btn-secondary btn-sm">Utleie</a>
                <a href="{{ url_for('statistikk.all_statistikk') }}" class="btn btn-secondary btn-sm">Statistikk</a>
                <a href="{{ url_for('users.logout') }}" class="btn btn-danger btn-sm">Logg ut</a>            
                {% else %}
                    <a href="{{ url_for('users.login') }}" class="btn btn-primary btn-sm">Logg in</a> | 
                    <a href="{{ url_for('users.register') }}" class="btn btn-secondary btn-sm">Registrer</a>
                {% endif %}          
            </div>
    </div>
    <div class="body-content">
    {% block content %}
    <!--Content from other HTMLs-->
    {% endblock %}
    <footer>
        <p>&copy; Oblig5 DTE-2509</p>
    </footer>
    </div>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
